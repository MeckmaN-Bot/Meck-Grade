<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MeckGrade — Holo Foil Lab</title>
<link rel="stylesheet" href="holo.css?v=36" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" crossorigin="anonymous"></script>
<script src="config.js?v=1"></script>

<script src="holo-data.js?v=36"></script>
<script src="holo-api.js?v=36"></script>
<script src="holo-editor.js?v=36"></script>

<script type="text/babel" src="holo-shell.jsx?v=36"></script>
<script type="text/babel" src="holo-1.jsx?v=36"></script>
<script type="text/babel" src="holo-2.jsx?v=36"></script>
<script type="text/babel" src="holo-3.jsx?v=36"></script>
<script type="text/babel" src="holo-extras.jsx?v=36"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

const CRUMBS = {
  dashboard:  ["Workspace", "Dashboard"],
  analyze:    ["Workspace", "Analyze · New scan"],
  analyzing:  ["Workspace", "Pipeline · running"],
  result:     ["Workspace", "Verdict"],
  collection: ["Vault", "Collection"],
  card:       ["Vault", "Card"],
  submission: ["Submission", "Builder"],
  watchlist:  ["Submission", "Watchlist"],
  population: ["Vault", "Population"],
  sets:       ["Vault", "Sets"],
  friends:    ["Account", "Friends"],
  settings:   ["Account", "Settings"],
  profile:    ["Account", "Profile"],
  publicprofile: ["Public", "Profile"],
};

function App() {
  const [route, setRoute] = useState("onboard");
  const [appState, setAppState] = useState(window.HoloAPI.getState());

  useEffect(() => {
    const unsub = window.HoloAPI.subscribe(s => setAppState({...s}));
    // Resume session if user-id stored, then honor hash deep-link if present.
    window.HoloAPI.refreshAll().then(() => {
      const hasMe = !!window.HoloAPI.getState().me;
      const m = (window.location.hash || "").match(/^#profile\/([\w.-]+)/);
      if (m && hasMe) {
        window.HoloAPI.setState({ publicProfile: { username: m[1] }});
        setRoute("publicprofile");
        return;
      }
      if (hasMe) setRoute("dashboard");
    });
    return unsub;
  }, []);

  // Mirror current route → hash (so the address bar reflects state and shared
  // /#profile/<user> links route to the right screen).
  useEffect(() => {
    if (route === "publicprofile" && appState.publicProfile?.username) {
      const want = `#profile/${appState.publicProfile.username}`;
      if (window.location.hash !== want) history.replaceState(null, "", want);
    } else if (route === "onboard") {
      if (window.location.hash) history.replaceState(null, "", window.location.pathname);
    }
  }, [route, appState.publicProfile?.username]);

  // Hash navigation (forward/back, share-link clicks within the SPA).
  useEffect(() => {
    const onHashChange = () => {
      const m = (window.location.hash || "").match(/^#profile\/([\w.-]+)/);
      if (m && window.HoloAPI.getState().me) {
        window.HoloAPI.setState({ publicProfile: { username: m[1] }});
        setRoute("publicprofile");
      }
    };
    window.addEventListener("hashchange", onHashChange);
    return () => window.removeEventListener("hashchange", onHashChange);
  }, []);

  // Lazy backfill TCGdex CDN images when needed
  useEffect(() => {
    if (["collection", "submission", "card", "profile"].includes(route)) {
      window.HoloAPI.backfillCardImages();
    }
  }, [route]);

  // Global Cmd+K listener
  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") {
        e.preventDefault();
        window.HoloAPI.setState({ cmdK: !appState.cmdK });
      }
      if (e.key === "Escape" && appState.cmdK) {
        window.HoloAPI.setState({ cmdK: false });
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [appState.cmdK]);

  const go = (next, params) => {
    if (params && params.sessionId) {
      window.HoloAPI.setState({ activeSession: params.sessionId });
    }
    if (params && params.result) {
      window.HoloAPI.setState({ activeResult: params.result });
    }
    if (params && params.publicUsername) {
      window.HoloAPI.setState({ publicProfile: { username: params.publicUsername }});
    }
    setRoute(next);
  };

  // Force onboard if no session
  if (!appState.me && route !== "onboard") {
    return <ScreenOnboard go={go} />;
  }

  if (route === "onboard") return <ScreenOnboard go={go} />;

  if (route === "card" || route === "publicprofile") {
    const Inner = route === "card" ? ScreenCard : ScreenPublicProfile;
    return (
      <div className="app">
        <Sidebar route={route} setRoute={setRoute} appState={appState} go={go} />
        <div className="main">
          <Inner go={go} appState={appState} />
        </div>
        {appState.cmdK && <CmdPalette go={go} appState={appState} onClose={() => window.HoloAPI.setState({ cmdK: false })}/>}
      </div>
    );
  }

  let Screen;
  switch (route) {
    case "dashboard":  Screen = ScreenDashboard;  break;
    case "analyze":    Screen = ScreenAnalyze;    break;
    case "analyzing":  Screen = ScreenAnalyzing;  break;
    case "result":     Screen = ScreenResult;     break;
    case "collection": Screen = ScreenCollection; break;
    case "submission": Screen = ScreenSubmission; break;
    case "watchlist":  Screen = ScreenWatchlist;  break;
    case "population": Screen = ScreenPopulation; break;
    case "sets":       Screen = ScreenSets;       break;
    case "friends":    Screen = ScreenFriends;    break;
    case "settings":   Screen = ScreenSettings;   break;
    case "profile":    Screen = ScreenMyProfile;  break;
    default: Screen = ScreenDashboard;
  }

  return (
    <div className="app">
      <Sidebar route={route} setRoute={setRoute} appState={appState} go={go} />
      <div className="main">
        <Topbar crumbs={CRUMBS[route] || ["Workspace"]} appState={appState} go={go}/>
        <div className="content">
          <Screen go={go} route={route} appState={appState} />
        </div>
      </div>
      {appState.cmdK && <CmdPalette go={go} appState={appState} onClose={() => window.HoloAPI.setState({ cmdK: false })}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
